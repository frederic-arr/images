---
name: Check and update bird3

on:
  workflow_dispatch:

jobs:
  get-apt-version:
    runs-on: ubuntu-latest
    container:
      image: debian:12-slim
    steps:
      - name: Install necessary packages
        run: |
          apt-get update && apt-get -y install apt-transport-https ca-certificates curl jq

      - name: Add CZ.NIC Labs Packaging GPG key
        run: |
          curl -o /usr/share/keyrings/cznic-labs-pkg.gpg https://pkg.labs.nic.cz/gpg

      - name: Setup the bird3 repository
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cznic-labs-pkg.gpg] https://pkg.labs.nic.cz/bird3 trixie main" | tee /etc/apt/sources.list.d/cznic-labs-bird3.list

      - name: UPdate apt bacpakge index with bird3 repo enabled
        run: |
          apt-get update

      - name: Get latest version from APT
        id: apt
        run: |
          APP_VERSION=$(apt-cache policy "bird3" | grep Candidate | awk '{print $2}')
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          IMAGE_VERSION=$(echo "$APP_VERSION" | cut -d'-' -f1)
          echo "image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT

  check-registry:
    runs-on: ubuntu-latest
    needs: get-apt-version
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check if image version exists in Dockerhub
        id: docker
        run: |
          IMAGE_VERSION=${{ needs.get-apt-version.outputs.image_version }}
          IMAGE="${{ vars.DOCKER_USERNAME }}/bird3:${IMAGE_VERSION}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "should_update=false" >> $GITHUB_OUTPUT
          else
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi

  build-and-publish-image:
    if: needs.check-registry.outputs.should_update == 'true'
    uses: ./.github/workflows/build-and-publish.yaml
    secrets: inherit
    needs:
      - get-apt-version
      - check-registry
    with:
      app_name: bird3
      app_version: ${{ needs.get-apt-version.outputs.app_version }}
      image_version: ${{ needs.get-apt-version.outputs.image_version }}
