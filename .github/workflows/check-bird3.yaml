---
name: Bird3
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: debian:12-slim
    steps:
      - name: Install necessary packages
        run: |
          apt-get update && apt-get -y install apt-transport-https ca-certificates wget

      - name: Add CZ.NIC Labs Packaging GPG key
        run: |
          wget -O /usr/share/keyrings/cznic-labs-pkg.gpg https://pkg.labs.nic.cz/gpg

      - name: Setup the bird3 repository
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cznic-labs-pkg.gpg] https://pkg.labs.nic.cz/bird3 trixie main" | tee /etc/apt/sources.list.d/cznic-labs-bird3.list

      - name: UPdate apt bacpakge index with bird3 repo enabled
        run: |
          apt-get update

      - name: Get latest version from APT
        id: apt
        run: |
          LATEST=$(apt-cache policy "bird3" | grep Candidate | awk '{print $2}')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get latest Docker image version from GHCR
        id: docker
        run: |
          LATEST_IMAGE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ github.repository_owner }}/$(basename $DOCKER_IMAGE)/tags/list" \
            | jq -r '.tags[]' \
            | sort -V \
            | tail -n 1)
          echo "version=$LATEST_IMAGE" >> $GITHUB_OUTPUT
