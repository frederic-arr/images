---
name: Build and publish container image

on:
  workflow_call:
    inputs:
      app_name:
        description: Application name
        required: true
        type: string

      app_version:
        description: Application version
        required: true
        type: string

      image_version:
        description: Image version
        required: true
        type: string

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to the Container registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: |
            ${{ github.repository_owner }}/${{ inputs.app_name }}
          labels: |
            org.opencontainers.image.url="https://github.com/${{ github.repository }}"
            org.opencontainers.image.documentation="https://github.com/${{ github.repository }}/tree/${{ github.sha }}/${{ inputs.app_name }}/README.md"
            org.opencontainers.image.source="https://github.com/${{ github.repository }}/tree/${{ github.sha }}/${{ inputs.app_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #v3.11.1

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./${{ inputs.app_name }}
          build-args: |
            APP_VERSION=${{ inputs.app_version }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}

          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ inputs.app_name }}:latest
            ${{ vars.DOCKER_USERNAME }}/${{ inputs.app_name }}:${{ inputs.image_version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: index.docker.io/${{ vars.DOCKER_USERNAME }}/${{ inputs.app_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
